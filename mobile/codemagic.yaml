# Codemagic CI for The Perfect Trader mobile (iOS + Android from Windows dev machines)
# Docs: docs/mobile/WINDOWS_DEV_SETUP.md
# Connect repo at https://codemagic.io and add App Store / Play credentials in UI groups.

workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    working_directory: mobile
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - app_store_credentials
    scripts:
      - name: Install dependencies
        script: flutter pub get
      - name: Run tests
        script: flutter test
      - name: Build IPA
        script: flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  android-release:
    name: Android Release
    max_build_duration: 60
    working_directory: mobile
    environment:
      flutter: stable
      groups:
        - google_play_credentials
    scripts:
      - name: Install dependencies
        script: flutter pub get
      - name: Run tests
        script: flutter test
      - name: Build App Bundle
        script: flutter build appbundle --release
    artifacts:
      - build/app/outputs/bundle/release/*.aab
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
