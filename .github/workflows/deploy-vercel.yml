# Deploy production to Vercel on push to main.
# Required GitHub repo secrets (Settings → Secrets → Actions):
#   VERCEL_TOKEN          — https://vercel.com/account/tokens
#   VERCEL_ORG_ID         — vercel.com → Settings → General
#   VERCEL_PROJECT_ID     — Project → Settings → General
#   NEXT_PUBLIC_SUPABASE_URL
#   NEXT_PUBLIC_SUPABASE_ANON_KEY
# Optional: NEXT_PUBLIC_BETA_MODE (default true), GEMINI_API_KEY

name: Deploy Vercel Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_BETA_MODE: ${{ secrets.NEXT_PUBLIC_BETA_MODE || 'true' }}

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./
