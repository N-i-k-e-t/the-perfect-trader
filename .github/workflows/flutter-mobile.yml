name: Flutter Mobile

on:
  push:
    paths:
      - 'mobile/**'
      - '.github/workflows/flutter-mobile.yml'
  pull_request:
    paths:
      - 'mobile/**'
      - '.github/workflows/flutter-mobile.yml'

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  ios-build:
    runs-on: macos-latest
    needs: analyze-test
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build ios --no-codesign

  android-build:
    runs-on: ubuntu-latest
    needs: analyze-test
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - run: flutter pub get
      - run: flutter build apk --debug
